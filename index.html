            align-items: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        .badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;

        .sync-status {

            height: 8px;
            background: #4ade80;

        @keyframes pulse {

        // ==================== 状态管理 ====================
        let todos = [];
        let currentViewWeek = 3;
        let today = new Date();
        let selectedTags = { important: false, urgent: false };

        // ==================== 标签选择 ====================
        function toggleTag(tag) {
            selectedTags[tag] = !selectedTags[tag];
            const label = document.getElementById(tag === 'important' ? 'labelImportant' : 'labelUrgent');
            const checkbox = document.getElementById(tag === 'important' ? 'checkImportant' : 'checkUrgent');

            checkbox.checked = selectedTags[tag];

            if (selectedTags[tag]) {
                label.classList.add(tag === 'important' ? 'selected-important' : 'selected-urgent');
            } else {
                label.classList.remove('selected-important', 'selected-urgent');
            }
        }

        // ==================== 日期工具 ====================
        function getWeekNumber(date) {
            const diffTime = date.getTime() - semesterStart.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            return Math.floor(diffDays / 7) + 1;
        }

        function getWeekStartDate(weekNum) {
            const start = new Date(semesterStart);
            start.setDate(start.getDate() + (weekNum - 1) * 7);
            return start;
        }

        // ==================== 渲染今日信息 ====================
        function renderTodayInfo() {
            const weekNum = getWeekNumber(today);
            const weekData = scheduleData.find(s => s.week === weekNum) || scheduleData[0];
            const dayOfWeek = today.getDay();

            currentViewWeek = weekNum;

            document.getElementById('currentWeekBadge').textContent = `第${weekNum}周`;
            document.getElementById('currentModule').textContent = weekData.module;
            document.getElementById('weekDisplay').textContent = `第${weekNum}周`;

            const todayCourses = weekData.courses.filter(c => c.day === dayOfWeek);

            const todayInfoEl = document.getElementById('todayInfo');
            if (todayCourses.length > 0) {
                todayInfoEl.innerHTML = todayCourses.map(c => `
                    <div class="schedule-item">
                        <div>
                            <div class="course-name">${c.name}</div>
                            <div class="course-info">${c.time || '08:30-16:50'} | ${c.teacher}</div>
                            <span class="course-tag">${c.location || weekData.location}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                todayInfoEl.innerHTML = `
                    <div class="no-class">
                        <div class="no-class-icon">🌟</div>
                        <div style="font-weight: 600; margin-bottom: 8px;">今日无课，自由安排！</div>
                        <div style="font-size: 13px; color: #999;">${getFreeDaySuggestion(weekNum)}</div>
                    </div>
                `;
            }

            renderRecommendations(weekNum, weekData, todayCourses.length > 0);
        }

        function getFreeDaySuggestion(weekNum) {
            const dayNum = today.getDay();
            if (dayNum === 0 || dayNum === 6) {
                return "周末整块时间：适合练车（科二/科三）或 集中完成大作业";
            }
            if (weekNum <= 3) return "建议：UI设计迭代 - 用户调研、原型制作、视觉设计";
            if (weekNum <= 6) return "建议：考察资料整理 + 学车练车";
            if (weekNum <= 10) return "建议：实习准备 - 产品分析、简历优化、项目复盘";
            return "建议：品牌形象设计作业 + 实习面试模拟";
        }

        function renderRecommendations(weekNum, weekData, hasClass) {
            const list = document.getElementById('recommendationList');
            const suggestions = [];

            if (weekNum <= 3) {
                suggestions.push("UI设计作业：完成适老化代际交流App的用户画像和痛点分析");
                suggestions.push("产品经理实习：整理英语读书App的AI功能方案文档");
                suggestions.push("学车：科目二倒车入库练习（利用晚间或周末）");
            } else if (weekNum <= 6) {
                suggestions.push("专业考察：整理考察笔记，准备拓展研究报告");
                suggestions.push("学车：科目二五项连练，准备约考");
                suggestions.push("实习准备：完成跑酷游戏竞品分析报告");
            } else if (weekNum <= 10) {
                suggestions.push("实习冲刺：优化产品方案文档，量化项目成果");
                suggestions.push("学车：科目三道路练习（利用无课日白天）");
                suggestions.push("作业：考察拓展研究PPT制作");
            } else {
                suggestions.push("品牌形象设计：完成互联网+品牌视觉识别系统");
                suggestions.push("实习准备：模拟面试，准备项目复盘故事");
                suggestions.push("学车：科目四理论刷题，准备拿证");
            }

            if (hasClass) {
                suggestions.unshift(`今日有专业课（${weekData.module}），课前30分钟可复习昨日内容`);
            }

            list.innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');
        }

        // ==================== 日历渲染 ====================
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            let html = weekDays.map(d => `<div class="calendar-header">${d}</div>`).join('');

            const weekStart = getWeekStartDate(currentViewWeek);

            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);

                const dayOfWeek = i;
                const dateNum = date.getDate();
                const isToday = date.toDateString() === today.toDateString();

                const weekData = scheduleData.find(s => s.week === currentViewWeek);
                const hasClass = weekData && weekData.courses.some(c => c.day === dayOfWeek);

                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasClass ? 'has-class' : ''}">
                        <div class="day-number">${dateNum}</div>
                        <div class="day-week">${weekDays[i]}</div>
                    </div>
                `;
            }

            calendar.innerHTML = html;
        }

        function changeWeek(delta) {
            currentViewWeek += delta;
            if (currentViewWeek < 1) currentViewWeek = 1;
            if (currentViewWeek > totalWeeks) currentViewWeek = totalWeeks;
            document.getElementById('weekDisplay').textContent = `第${currentViewWeek}周`;
            renderCalendar();
        }

        // ==================== 待办事项功能 ====================
        async function loadTodos() {
            if (!supabaseClient) {
                document.getElementById('todoList').innerHTML = 
                    '<div class="empty-state">数据库连接失败，请刷新重试</div>';
                return;
            }

            const { data, error } = await supabaseClient
                .from('todo')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });

            if (error) {
                console.error('加载失败:', error);
                document.getElementById('todoList').innerHTML = 
                    '<div class="empty-state">同步失败，请刷新重试</div>';
                return;
            }

            if (data) {
                todos = data;
                renderTodos();
            }
        }

        async function addTodo(title, tags = {}) {
            if (!title.trim()) {
                alert('请输入待办内容！');
                return;
            }

            if (!supabaseClient) {
                alert('数据库连接失败，请刷新页面');
                return;
            }

            // 智能识别分类标签
            let categoryTag = 'other';
            if (title.includes('实习') || title.includes('产品') || title.includes('AI')) categoryTag = 'intern';
            else if (title.includes('车') || title.includes('科二') || title.includes('科三') || title.includes('练车')) categoryTag = 'driving';
            else if (title.includes('作业') || title.includes('UI') || title.includes('设计') || title.includes('app')) categoryTag = 'homework';

            const newTodo = {
                title: title.trim(),
                completed: false,
                user_id: userId,
                category_tag: categoryTag,
                is_important: tags.important || false,
                is_urgent: tags.urgent || false,
                created_at: new Date().toISOString()
            };

            console.log('正在添加待办:', newTodo);

            const { data, error } = await supabaseClient
                .from('todo')
                .insert([newTodo])
                .select();

            if (error) {
                console.error('添加失败:', error);
                alert('添加失败：' + error.message);
                return;
            }

            console.log('添加成功:', data);

            if (data && data[0]) {
                todos.unshift(data[0]);
                renderTodos();

                // 清空输入和标签
                document.getElementById('todoInput').value = '';
                selectedTags = { important: false, urgent: false };
                document.getElementById('checkImportant').checked = false;
                document.getElementById('checkUrgent').checked = false;
                document.getElementById('labelImportant').classList.remove('selected-important');
                document.getElementById('labelUrgent').classList.remove('selected-urgent');
            }
        }

        async function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            const newStatus = !todo.completed;

            const { error } = await supabaseClient
                .from('todo')
                .update({ completed: newStatus })
                .eq('id', id);

            if (error) return;

            todo.completed = newStatus;
            renderTodos();
        }

        async function deleteTodo(id) {
            const { error } = await supabaseClient
                .from('todo')
                .delete()
                .eq('id', id);

            if (error) return;

            todos = todos.filter(t => t.id !== id);
            renderTodos();
        }

        function addTodoFromInput() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            addTodo(text, selectedTags);
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;

            if (todos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 10px;">📝</div>
                        <div>暂无待办事项</div>
                        <div style="font-size: 12px; margin-top: 8px;">添加你的第一个任务吧！</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = todos.map(todo => {
                let priorityTags = '';
                if (todo.is_important) {
                    priorityTags += '<span class="todo-tag tag-important">🔴 重要</span>';
                }
                if (todo.is_urgent) {
                    priorityTags += '<span class="todo-tag tag-urgent">🟡 紧急</span>';
                }
                if (todo.category_tag && todo.category_tag !== 'other') {
                    priorityTags += `<span class="todo-tag tag-${todo.category_tag}">${getCategoryName(todo.category_tag)}</span>`;
                }

                return `
                    <div class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')">
                            ${todo.completed ? '✓' : ''}
                        </div>
                        <div class="todo-content">
                            <div class="todo-text">${escapeHtml(todo.title)}</div>
                            ${priorityTags ? `<div class="todo-tags">${priorityTags}</div>` : ''}
                        </div>
                        <button class="delete-btn" onclick="deleteTodo('${todo.id}')">删除</button>
                    </div>
                `;
            }).join('');
        }

        function getCategoryName(tag) {
            const names = {
                'intern': '💼 实习准备',
                'driving': '🚗 学车',
                'homework': '📚 课堂作业',
                'other': '📝 其他'
            };
            return names[tag] || '其他';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 实时订阅 ====================
        function setupRealtime() {
            if (!supabaseClient) return;

            supabaseClient
                .channel('todos-channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'todo', filter: `user_id=eq.${userId}` },
                    () => { loadTodos(); }
                )
                .subscribe();
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderTodayInfo();
            renderCalendar();
            loadTodos();
            setupRealtime();

            console.log('每日成长打卡系统已启动');
            console.log('用户ID:', userId);
            console.log('同步码:', syncCode || '未设置');
        });
    </script>
