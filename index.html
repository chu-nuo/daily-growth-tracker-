                suggestions.push("学车：科目四理论刷题，准备拿证");
            }
            
            list.innerHTML = suggestions.map(s => `
                <li>
                    <span>${s}</span>
                    <button class="add-suggestion-btn" onclick="addSuggestion('${s.replace(/'/g, "\\'")}')">添加</button>
                </li>
            `).join('');
        }
        
        function addSuggestion(text) {
            let imp = text.includes('作业') || text.includes('实习');
            let urg = text.includes('准备') || text.includes('完成');
            addTodo(text, { important: imp, urgent: urg });
        }
        
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            // 关键修复：表头从周一开始
            const weekDays = ['一', '二', '三', '四', '五', '六', '日'];
            let html = weekDays.map(d => `<div class="calendar-header">${d}</div>`).join('');
            
            const weekStart = getWeekStart(currentViewWeek);
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);
                const dayOfWeek = i === 6 ? 0 : i + 1; // 周日是0
                const dateNum = date.getDate();
                const isToday = date.toDateString() === today.toDateString();
                
                const weekData = scheduleData.find(s => s.week === currentViewWeek);
                const hasClass = weekData && weekData.courses.some(c => c.day === dayOfWeek);
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''} ${hasClass ? 'has-class' : ''}"><div class="day-number">${dateNum}</div></div>`;
            }
            calendar.innerHTML = html;
        }
        
        function changeWeek(delta) {
            currentViewWeek += delta;
            if (currentViewWeek < 1) currentViewWeek = 1;
            if (currentViewWeek > 17) currentViewWeek = 17;
            document.getElementById('weekDisplay').textContent = `第${currentViewWeek}周`;
            renderCalendar();
        }
        
        async function loadTodos() {
            try {
                const { data, error } = await supabaseClient
                    .from('todo')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                todos = data || [];
                renderTodos();
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('todoList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }
        
        async function addTodo(title, tags = {}) {
            if (!title.trim()) return;
            
            let catTag = 'other';
            if (title.includes('实习') || title.includes('产品')) catTag = 'intern';
            else if (title.includes('车') || title.includes('科二') || title.includes('科三')) catTag = 'driving';
            else if (title.includes('作业') || title.includes('UI') || title.includes('设计')) catTag = 'homework';
            
            const newTodo = {
                title: title.trim(),
                completed: false,
                user_id: userId,
                category_tag: catTag,
                is_important: tags.important || false,
                is_urgent: tags.urgent || false,
                created_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await supabaseClient
                    .from('todo')
                    .insert([newTodo])
                    .select();
                
                if (error) throw error;
                
                if (data && data[0]) {
                    todos.unshift(data[0]);
                    renderTodos();
                    document.getElementById('todoInput').value = '';
                    selectedTags = { important: false, urgent: false };
                    document.getElementById('checkImportant').checked = false;
                    document.getElementById('checkUrgent').checked = false;
                    document.getElementById('labelImportant').classList.remove('selected-important');
                    document.getElementById('labelUrgent').classList.remove('selected-urgent');
                }
            } catch (err) {
                console.error('添加失败:', err);
                alert('添加失败：' + err.message);
            }
        }
        
        function addTodoFromInput() {
            const text = document.getElementById('todoInput').value;
            addTodo(text, selectedTags);
        }
        
        async function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            const newStatus = !todo.completed;
            
            try {
                await supabaseClient.from('todo').update({ completed: newStatus }).eq('id', id);
                todo.completed = newStatus;
                renderTodos();
            } catch (err) {
                console.error('更新失败:', err);
            }
        }
        
        async function deleteTodo(id) {
            try {
                await supabaseClient.from('todo').delete().eq('id', id);
                todos = todos.filter(t => t.id !== id);
                renderTodos();
            } catch (err) {
                console.error('删除失败:', err);
            }
        }
        
        function renderTodos() {
            const list = document.getElementById('todoList');
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = total - completed;
            document.getElementById('completedCount').textContent = completed;
            
            if (todos.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无待办</div>';
                return;
            }
            
            list.innerHTML = todos.map(todo => {
                let tagsHtml = '';
                if (todo.is_important) tagsHtml += '<span class="todo-tag tag-important">🔴 重要</span>';
                if (todo.is_urgent) tagsHtml += '<span class="todo-tag tag-urgent">🟡 紧急</span>';
                if (todo.category_tag && todo.category_tag !== 'other') tagsHtml += `<span class="todo-tag tag-${todo.category_tag}">${getCatName(todo.category_tag)}</span>`;
                
                return `<div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')">${todo.completed ? '✓' : ''}</div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.title)}</div>
                        ${tagsHtml ? `<div class="todo-tags">${tagsHtml}</div>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteTodo('${todo.id}')">删除</button>
                </div>`;
            }).join('');
        }
        
        function getCatName(tag) {
            const names = { intern: '💼 实习', driving: '🚗 学车', homework: '📚 作业', other: '📝 其他' };
            return names[tag] || '其他';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            renderToday();
            renderCalendar();
            loadTodos();
            
            document.getElementById('todoInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') addTodoFromInput();
            });
        });
    </script>
