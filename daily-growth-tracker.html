            flex-wrap: wrap;

            color: #666;
            font-size: 14px;

        .badge {

            border-radius: 20px;

            font-weight: 600;
        }

        .sync-status {

        .card-title {

            font-weight: 700;

        .schedule-item:last-child {

        .course-name {
            font-weight: 600;

        .course-time {

        .course-location {

        .calendar-day:hover {

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }

            { week: 16, module: "互联网+品牌形象设计", location: "老上善A306", dates: ["06-15","06-17","06-19"], days: ["周一","周三","周五"], name: "专题设计14-6(互联网+品牌形象设计)", teacher: "高原/李海亭" },

        ];

        // ==================== 状态管理 ====================
        let todos = [];
        let currentWeekOffset = 0; // 日历显示偏移
        let today = new Date('2026-03-16'); // 假设今天是3月16日（第3周周一）

        // ==================== 日期工具函数 ====================
        function getWeekNumber(date) {
            const diff = date - semesterStartDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            return Math.floor(days / 7) + 1;
        }

        function formatDate(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            return `${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        }

        function getDayName(date) {
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return days[date.getDay()];
        }

        // ==================== 待办事项功能（Supabase版）====================
        async function loadTodos() {
            const { data, error } = await supabase
                .from('todo')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false }); // 新的在前

            if (error) {
                console.error('加载失败:', error);
                document.getElementById('todoList').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div>同步失败，请刷新重试</div>';
                return;
            }

            if (data) {
                todos = data;
                renderTodos();
            }
        }

        async function addTodo(title, tag = 'other') {
            if (!title.trim()) return;

            const newTodo = {
                title: title.trim(),
                completed: false,
                user_id: userId,
                tag: tag,
                created_at: new Date().toISOString()
            };

            const { data, error } = await supabase
                .from('todo')
                .insert([newTodo])
                .select();

            if (error) {
                console.error('添加失败:', error);
                alert('添加失败，请检查网络');
                return;
            }

            if (data && data[0]) {
                todos.unshift(data[0]); // 置顶
                renderTodos();
            }
        }

        async function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            const newStatus = !todo.completed;

            const { error } = await supabase
                .from('todo')
                .update({ completed: newStatus })
                .eq('id', id);

            if (error) {
                console.error('更新失败:', error);
                return;
            }

            todo.completed = newStatus;
            renderTodos();
        }

        async function deleteTodo(id) {
            const { error } = await supabase
                .from('todo')
                .delete()
                .eq('id', id);

            if (error) {
                console.error('删除失败:', error);
                return;
            }

            todos = todos.filter(t => t.id !== id);
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            const totalEl = document.getElementById('totalCount');
            const pendingEl = document.getElementById('pendingCount');
            const completedEl = document.getElementById('completedCount');

            // 更新统计
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            totalEl.textContent = total;
            pendingEl.textContent = pending;
            completedEl.textContent = completed;

            if (todos.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div>暂无待办事项</div>
                        <div style="font-size: 12px; margin-top: 8px;">添加你的第一个任务吧！</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo('${todo.id}')">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.title)}</div>
                        ${todo.tag ? `<span class="todo-tag tag-${todo.tag}">${getTagName(todo.tag)}</span>` : ''}
                    </div>
                    <button class="delete-btn" onclick="deleteTodo('${todo.id}')">删除</button>
                </div>
            `).join('');
        }

        function getTagName(tag) {
            const names = {
                'intern': '实习准备',
                'driving': '学车',
                'homework': '课堂作业',
                'other': '其他'
            };
            return names[tag] || '其他';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTodoFromInput() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;

            // 智能识别标签
            let tag = 'other';
            if (text.includes('实习') || text.includes('产品') || text.includes('AI')) tag = 'intern';
            else if (text.includes('车') || text.includes('科二') || text.includes('科三') || text.includes('练车')) tag = 'driving';
            else if (text.includes('作业') || text.includes('UI') || text.includes('设计') || text.includes('app')) tag = 'homework';

            addTodo(text, tag);
            input.value = '';
        }

        // 回车添加
        document.getElementById('todoInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodoFromInput();
        });

        // 实时订阅
        function setupRealtime() {
            supabase
                .channel('todos-channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'todo', filter: `user_id=eq.${userId}` },
                    (payload) => {
                        console.log('数据变化:', payload);
                        loadTodos();
                    }
                )
                .subscribe();
        }

        // ==================== 日历和课程功能 ====================
        function getCurrentWeekData() {
            const weekNum = getWeekNumber(today);
            return scheduleData.find(s => s.week === weekNum) || scheduleData[0];
        }

        function renderTodayInfo() {
            const dateStr = formatDate(today);
            const dayName = getDayName(today);
            const weekNum = getWeekNumber(today);
            const weekData = getCurrentWeekData();

            document.getElementById('todayTitle').textContent = `今日概览（${today.getMonth()+1}月${today.getDate()}日 ${dayName}）`;
            document.getElementById('currentWeek').textContent = `第${weekNum}周`;
            document.getElementById('currentModule').textContent = weekData.module;
            document.getElementById('weekDisplay').textContent = `第${weekNum}周`;

            // 查找今日是否有课
            const month = (today.getMonth() + 1).toString().padStart(2, '0');
            const day = today.getDate().toString().padStart(2, '0');
            const fullDateStr = `${month}-${day}`;

            const todayCourses = [];
            scheduleData.forEach(week => {
                week.dates.forEach((d, i) => {
                    if (d === fullDateStr) {
                        todayCourses.push({
                            name: week.name,
                            teacher: week.teacher,
                            time: '08:30-16:50',
                            location: week.location,
                            day: week.days[i]
                        });
                    }
                });
            });

            const scheduleEl = document.getElementById('todaySchedule');
            if (todayCourses.length > 0) {
                scheduleEl.innerHTML = todayCourses.map(c => `
                    <div class="schedule-item">
                        <div>
                            <div class="course-name">${c.name}</div>
                            <div class="course-time">⏰ ${c.time}</div>
                            <span class="course-location">📍 ${c.location}</span>
                        </div>
                        <div style="text-align: right;">
                            <div style="font-weight: 600; color: #667eea;">${c.day}</div>
                            <div style="font-size: 13px; color: #666; margin-top: 4px;">${c.teacher}</div>
                        </div>
                    </div>
                `).join('');

                // 添加空闲时间提示
                scheduleEl.innerHTML += `
                    <div class="free-time">
                        <strong>💡 空闲时段建议：</strong><br>
                        早间 08:00-08:30：可背单词/看产品文章<br>
                        晚间 16:50-22:00：${getEveningSuggestion()}
                    </div>
                `;
            } else {
                scheduleEl.innerHTML = `
                    <div style="text-align: center; padding: 30px; color: #666;">
                        <div style="font-size: 48px; margin-bottom: 10px;">🌟</div>
                        <div>今日无课，自由安排！</div>
                        <div style="font-size: 13px; margin-top: 8px; color: #999;">建议：${getFreeDaySuggestion()}</div>
                    </div>
                `;
            }

            // 生成建议
            renderRecommendations(todayCourses.length > 0, weekData);
        }

        function getEveningSuggestion() {
            const weekNum = getWeekNumber(today);
            if (weekNum <= 3) {
                return "UI设计作业（适老化App调研/原型）或 学车理论复习";
            } else if (weekNum <= 6) {
                return "专业考察报告整理 或 学车练车";
            } else if (weekNum <= 10) {
                return "AI产品经理实习准备（竞品分析/产品文档）";
            } else {
                return "交互设计作业 或 实习面试准备";
            }
        }

        function getFreeDaySuggestion() {
            const weekNum = getWeekNumber(today);
            const dayNum = today.getDay();

            if (dayNum === 6 || dayNum === 0) {
                return "周末整块时间：适合练车（科二/科三）或 集中完成大作业";
            }
            if (weekNum <= 3) return "UI设计迭代：用户调研、原型制作、视觉设计";
            if (weekNum <= 6) return "考察资料整理 + 学车";
            if (weekNum <= 10) return "实习准备：产品分析、简历优化、项目复盘";
            return "品牌形象设计作业 + 实习面试模拟";
        }

        function renderRecommendations(hasClass, weekData) {
            const list = document.getElementById('recommendationList');
            const weekNum = getWeekNumber(today);
            const suggestions = [];

            // 根据周数给出具体建议
            if (weekNum <= 3) {
                suggestions.push("UI设计作业：完成适老化代际交流App的用户画像和痛点分析");
                suggestions.push("产品经理实习：整理英语读书App的AI功能方案文档");
                suggestions.push("学车：科目二倒车入库练习（利用晚间或周末）");
            } else if (weekNum <= 6) {
                suggestions.push("专业考察：整理考察笔记，准备拓展研究报告");
                suggestions.push("学车：科目二五项连练，准备约考");
                suggestions.push("实习准备：完成跑酷游戏竞品分析报告");
            } else if (weekNum <= 10) {
                suggestions.push("实习冲刺：优化产品方案文档，量化项目成果（留存率/满意度数据）");
                suggestions.push("学车：科目三道路练习（利用无课日白天）");
                suggestions.push("作业：考察拓展研究PPT制作");
            } else {
                suggestions.push("品牌形象设计：完成互联网+品牌视觉识别系统");
                suggestions.push("实习准备：模拟面试，准备项目复盘故事");
                suggestions.push("学车：科目四理论刷题，准备拿证");
            }

            if (hasClass) {
                suggestions.unshift(`今日有专业课（${weekData.module}），课前30分钟可复习昨日内容`);
            }

            list.innerHTML = suggestions.map(s => `<li>${s}</li>`).join('');
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            // 表头
            let html = weekDays.map(d => `<div class="calendar-header">${d}</div>`).join('');

            // 计算当前显示周的日期
            const currentWeekNum = getWeekNumber(today) + currentWeekOffset;
            const weekStart = new Date(semesterStartDate);
            weekStart.setDate(weekStart.getDate() + (currentWeekNum - 1) * 7);

            // 生成7天
            for (let i = 0; i < 7; i++) {
                const date = new Date(weekStart);
                date.setDate(weekStart.getDate() + i);

                const dateStr = formatDate(date);
                const monthDay = `${date.getMonth()+1}/${date.getDate()}`;
                const isToday = date.toDateString() === today.toDateString();

                // 检查是否有课
                let hasClass = false;
                scheduleData.forEach(week => {
                    if (week.dates.includes(dateStr)) hasClass = true;
                });

                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasClass ? 'has-class' : ''}" 
                         onclick="selectDate('${dateStr}')">
                        <div style="font-weight: ${isToday ? '700' : '400'};">${monthDay}</div>
                    </div>
                `;
            }

            calendar.innerHTML = html;
        }

        function changeWeek(delta) {
            currentWeekOffset += delta;
            if (currentWeekOffset < -getWeekNumber(today) + 1) currentWeekOffset = -getWeekNumber(today) + 1;
            if (currentWeekOffset > totalWeeks - getWeekNumber(today)) currentWeekOffset = totalWeeks - getWeekNumber(today);
            renderCalendar();
        }

        function selectDate(dateStr) {
            // 可以在这里添加点击日期的逻辑，比如显示那天的详细安排
            console.log('选择日期:', dateStr);
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            renderTodayInfo();
            renderCalendar();
            loadTodos();
            setupRealtime();

            console.log('每日成长打卡系统已启动');
            console.log('用户ID:', userId);
            console.log('提示：在不同设备上打开此页面，使用相同的用户ID即可同步数据');
            console.log('如需固定同步码，可在控制台执行：localStorage.setItem("todo_user_id", "你的固定ID")');
        });
    </script>
</body>
</html>
